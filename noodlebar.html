<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Noodle Bar Brussels — Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Inter:wght@300;400;600&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#1a0a00;font-family:'Inter',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh}
  .demo-banner{position:fixed;top:0;left:0;right:0;background:#e63900;color:#fff;text-align:center;padding:8px;font-size:11px;letter-spacing:1px;z-index:100}
  .widget{width:400px;height:610px;display:flex;flex-direction:column;background:#1e1209;border-radius:8px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.5);margin-top:30px;border:1px solid #3d2010}
  .header{background:#e63900;padding:20px;display:flex;align-items:center;justify-content:space-between}
  .h-brand{display:flex;flex-direction:column}
  .h-name{font-family:'Noto Sans JP',sans-serif;font-size:18px;font-weight:700;color:#fff;letter-spacing:1px}
  .h-sub{font-size:10px;color:rgba(255,255,255,0.85);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
  .h-icon{font-size:28px}
  .messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
  .msg{max-width:84%;padding:12px 16px;font-size:13px;line-height:1.65}
  .msg.bot{background:#2c1a0a;color:#f5e6d0;border-radius:0 12px 12px 12px;border-left:3px solid #e63900}
  .msg.user{background:#e63900;color:#fff;border-radius:12px 12px 0 12px;margin-left:auto}
  .sender{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;color:#e63900}
  .msg.user .sender{color:rgba(255,255,255,0.7)}
  .suggestions{display:flex;flex-wrap:wrap;gap:7px;padding:0 16px 12px}
  .sug{background:transparent;border:1.5px solid #e63900;color:#e63900;padding:7px 12px;border-radius:4px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;transition:all .2s}
  .sug:hover{background:#e63900;color:#fff}
  .input-area{padding:14px 16px;background:#150900;display:flex;gap:10px;border-top:1px solid #3d2010}
  .input-area input{flex:1;border:1.5px solid #3d2010;padding:10px 14px;font-size:13px;font-family:'Inter',sans-serif;outline:none;border-radius:4px;background:#2c1a0a;color:#f5e6d0}
  .input-area input::placeholder{color:#7a5a40}
  .input-area input:focus{border-color:#e63900}
  .send-btn{background:#e63900;color:#fff;border:none;width:40px;height:40px;border-radius:4px;cursor:pointer;font-size:16px;transition:all .2s}
  .send-btn:hover{background:#ff5500}
  .typing{display:flex;gap:5px;padding:6px 0}
  .typing span{width:7px;height:7px;background:#e63900;border-radius:50%;animation:b 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s}
  .typing span:nth-child(3){animation-delay:.4s}
  @keyframes b{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}
</style>
</head>
<body>
<div class="demo-banner">🍜 Démo interactive — Assistant IA The Noodle Bar Brussels</div>
<div class="widget">
  <div class="header">
    <div class="h-brand">
      <span class="h-name">The Noodle Bar</span>
      <span class="h-sub">Brussels · Kaasmarkt 15</span>
    </div>
    <span class="h-icon">🍜</span>
  </div>
  <div class="messages" id="msgs">
    <div class="msg bot">
      <div class="sender">Noodle Bar</div>
      Irasshaimase ! 🍜 Bienvenue au Noodle Bar Brussels.<br><br>Menu, réservations, allergènes… je réponds à tout. Comment puis-je vous aider ?
    </div>
  </div>
  <div class="suggestions" id="sugs">
    <button class="sug" onclick="ask(this)">Réserver une table</button>
    <button class="sug" onclick="ask(this)">Menu du jour</button>
    <button class="sug" onclick="ask(this)">Allergènes</button>
    <button class="sug" onclick="ask(this)">Horaires</button>
  </div>
  <div class="input-area">
    <input id="inp" placeholder="Menu, résa, allergènes…" onkeydown="if(event.key==='Enter')send()">
    <button class="send-btn" onclick="send()">→</button>
  </div>
</div>
<script>
const R={
  "resa":["Pour réserver, appelez-nous ou passez directement au <strong>Kaasmarkt 15</strong>, juste à côté de la Grand Place. Pour les groupes (+6 personnes), la réservation est recommandée !","On accepte les réservations pour groupes. Pour les tables individuelles, venez directement — on trouve toujours une place ! 🍜"],
  "menu":["Notre menu voyage entre <strong>Thaïlande, Chine et Japon</strong> : bowls de nouilles fraîches, dim sum, samosas, rouleaux de printemps, plats de riz… Tout est préparé frais chaque jour !","Spécialités du moment : ramen, pad thaï, bao, gyoza et nos fameux bowls signature. Végétarien disponible. Envie d'un plat en particulier ?"],
  "allergen":["Nous prenons les allergies très au sérieux 🙏 Nos principaux allergènes : gluten, soja, sésame, arachides, fruits à mer. Dites-nous votre allergie et on adapte votre plat au maximum.","Notez votre allergie en réservant ou à l'arrivée — notre équipe connaît chaque ingrédient. Quelles sont vos restrictions ?"],
  "horaire":["Ouvert <strong>7j/7</strong> — midi et soir. Consultez notre page Google Maps ou Facebook pour les horaires exacts du jour. Nous sommes au <strong>Kaasmarkt 15</strong>, à 2 minutes de la Grand Place.","On est ouverts pratiquement tous les jours ! Vérifiez les horaires sur notre page Facebook ou Google. À bientôt 🍜"],
  "groupe":["Vous êtes un groupe ? On adore ça ! Pour les tables de 6+ personnes, contactez-nous à l'avance pour garantir votre place. Menus groupes possibles sur demande.","Groupes, anniversaires, afterworks… on s'adapte ! Contactez-nous pour les grandes tablées."],
  "vege":["Nous avons une belle sélection végétarienne : bowls tofu, rouleaux légumes, soupe miso, pad thaï végé… Dites-nous vos préférences !","Option végé disponible sur la plupart des plats. On peut aussi adapter selon vos besoins — n'hésitez pas à demander."],
  "livraison":["Nous faisons de la livraison via les plateformes habituelles. Consultez Deliveroo ou Uber Eats pour commander depuis chez vous. 🛵","Livraison disponible ! Cherchez 'Noodle Bar Brussels' sur Deliveroo ou Uber Eats."],
  "default":["Le Noodle Bar Brussels, c'est les saveurs d'Asie du Sud-Est à côté de la Grand Place 🗺️ Menu, réservations, infos allergènes — demandez !","Pour toute info, trouvez-nous au <strong>Kaasmarkt 15</strong> ou sur notre page Facebook/Google. On a hâte de vous faire découvrir nos saveurs ! 🍜"]
};
let ri={};
function getR(k){ri[k]=(ri[k]||0);let r=R[k][ri[k]%R[k].length];ri[k]++;return r;}
function detect(t){t=t.toLowerCase();if(t.match(/réserv|table|book|place/))return"resa";if(t.match(/menu|plat|carte|manger|food|noodle|ramen|pad|dim/))return"menu";if(t.match(/allergi|allergen|gluten|soja|arachide|noix|intoléran/))return"allergen";if(t.match(/horaire|heure|ouvert|fermé|quand/))return"horaire";if(t.match(/groupe|team|anniversaire|afterwork/))return"groupe";if(t.match(/végé|vegan|végétarien|sans viande/))return"vege";if(t.match(/livraison|deliver|emporter|takeaway/))return"livraison";return"default";}
function addMsg(t,s,html=false){const m=document.createElement('div');m.className='msg '+s;const sn=document.createElement('div');sn.className='sender';sn.textContent=s==='bot'?'Noodle Bar':'Vous';m.appendChild(sn);const txt=document.createElement('span');if(html)txt.innerHTML=t;else txt.textContent=t;m.appendChild(txt);document.getElementById('msgs').appendChild(m);m.scrollIntoView({behavior:'smooth'});}
function showTyping(){const t=document.createElement('div');t.className='msg bot';t.id='typing';t.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';document.getElementById('msgs').appendChild(t);t.scrollIntoView({behavior:'smooth'});}
function ask(el){const q=el.textContent;document.getElementById('sugs').style.display='none';addMsg(q,'user');showTyping();setTimeout(()=>{document.getElementById('typing')?.remove();addMsg(getR(detect(q)),'bot',true);},900);}
function send(){const v=document.getElementById('inp').value.trim();if(!v)return;document.getElementById('sugs').style.display='none';document.getElementById('inp').value='';addMsg(v,'user');showTyping();setTimeout(()=>{document.getElementById('typing')?.remove();addMsg(getR(detect(v)),'bot',true);},900);}
</script>
</body>
</html>
