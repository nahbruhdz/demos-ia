<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Immo — Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#f0ede8;font-family:'DM Sans',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh}
  .demo-banner{position:fixed;top:0;left:0;right:0;background:#2d4a22;color:#fff;text-align:center;padding:8px;font-size:11px;letter-spacing:1px;z-index:100}
  .widget{width:400px;height:610px;display:flex;flex-direction:column;background:#fff;border-radius:6px;overflow:hidden;box-shadow:0 20px 60px rgba(45,74,34,0.12);margin-top:30px}
  .header{background:#2d4a22;padding:22px 20px;display:flex;align-items:flex-start;justify-content:space-between}
  .h-left{display:flex;flex-direction:column}
  .h-name{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;letter-spacing:0.5px}
  .h-sub{font-size:10px;color:rgba(255,255,255,0.7);letter-spacing:2px;text-transform:uppercase;margin-top:4px}
  .h-tag{background:#a8c97a;color:#1a3010;font-size:10px;font-weight:600;padding:4px 10px;border-radius:3px;letter-spacing:0.5px;margin-top:10px;width:fit-content}
  .h-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
  .h-dot{width:9px;height:9px;border-radius:50%;background:#a8c97a;box-shadow:0 0 0 3px rgba(168,201,122,0.3)}
  .messages{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px;background:#f9f7f4}
  .msg{max-width:85%;padding:12px 16px;font-size:13px;line-height:1.65}
  .msg.bot{background:#fff;color:#1a2a12;border-radius:0 10px 10px 10px;box-shadow:0 2px 8px rgba(45,74,34,0.07);border:1px solid #e8e4de}
  .msg.user{background:#2d4a22;color:#fff;border-radius:10px 10px 0 10px;margin-left:auto}
  .sender{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;color:#2d4a22}
  .msg.user .sender{color:rgba(168,201,122,0.9)}
  .suggestions{display:flex;flex-wrap:wrap;gap:7px;padding:0 18px 12px}
  .sug{background:#fff;border:1.5px solid #c8dca8;color:#2d4a22;padding:7px 12px;border-radius:4px;font-size:11.5px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .2s}
  .sug:hover{background:#2d4a22;color:#fff;border-color:#2d4a22}
  .input-area{padding:14px 18px;background:#fff;display:flex;gap:10px;border-top:1px solid #e8e4de}
  .input-area input{flex:1;border:1.5px solid #d8d0c4;padding:10px 14px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;border-radius:4px;color:#1a2a12;background:#f9f7f4}
  .input-area input:focus{border-color:#2d4a22}
  .send-btn{background:#2d4a22;color:#fff;border:none;width:40px;height:40px;border-radius:4px;cursor:pointer;font-size:16px;transition:all .2s}
  .send-btn:hover{background:#a8c97a;color:#1a3010}
  .typing{display:flex;gap:5px;padding:6px 0}
  .typing span{width:7px;height:7px;background:#a8c97a;border-radius:50%;animation:b 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s}
  .typing span:nth-child(3){animation-delay:.4s}
  @keyframes b{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}
</style>
</head>
<body>
<div class="demo-banner">🏠 Démo interactive — Assistant IA Link Immo Ixelles</div>
<div class="widget">
  <div class="header">
    <div class="h-left">
      <span class="h-name">Link Immo</span>
      <span class="h-sub">Agence immobilière · Ixelles</span>
      <span class="h-tag">Achat · Vente · Gestion</span>
    </div>
    <div class="h-right">
      <div class="h-dot"></div>
    </div>
  </div>
  <div class="messages" id="msgs">
    <div class="msg bot">
      <div class="sender">Link Immo</div>
      Bonjour ! Je suis l'assistant de <strong>Link Immo</strong>, votre agence à Ixelles. 🏠<br><br>Achat, vente, estimation, gestion locative… Comment puis-je vous aider ?
    </div>
  </div>
  <div class="suggestions" id="sugs">
    <button class="sug" onclick="ask(this)">Estimer mon bien</button>
    <button class="sug" onclick="ask(this)">Biens à vendre</button>
    <button class="sug" onclick="ask(this)">Mettre en vente</button>
    <button class="sug" onclick="ask(this)">Gestion locative</button>
  </div>
  <div class="input-area">
    <input id="inp" placeholder="Votre question immobilière…" onkeydown="if(event.key==='Enter')send()">
    <button class="send-btn" onclick="send()">→</button>
  </div>
</div>
<script>
const R={
  "estim":["Nous réalisons des <strong>estimations gratuites et sans engagement</strong> pour tous types de biens à Bruxelles et alentours. Contactez Dimitri au <strong>02/640.10.10</strong> ou via info@linkimmo.be.","Notre estimation est basée sur une analyse du marché local et des comparables récents dans votre quartier. 100% gratuit. Quel type de bien souhaitez-vous estimer ?"],
  "achat":["Link Immo propose une sélection de biens à Ixelles et dans les 19 communes bruxelloises. Appartements, maisons, studios… Consultez nos annonces sur <strong>linkimmo.be</strong>.","Vous cherchez à acheter ? Nous pouvons vous accompagner de la recherche jusqu'à la signature chez le notaire. Quel est votre budget et votre quartier cible ?"],
  "vente":["Vendre avec Link Immo : estimation gratuite, photos professionnelles, diffusion sur tous les portails (Immoweb, etc.), accompagnement complet. Contactez-nous au <strong>02/640.10.10</strong>.","Nous prenons en charge toute la vente : valorisation du bien, visites, négociation, actes. Quel est votre bien ?"],
  "gestion":["Notre service de gestion locative s'occupe de tout : recherche de locataires, état des lieux, perception des loyers, suivi technique. Vous êtes propriétaire sans les tracas.","Gestion locative complète : de la mise en location au suivi mensuel. Taux compétitifs. Parlez-en à Dimitri au <strong>02/640.10.10</strong>."],
  "louer":["Vous souhaitez louer ? Consultez nos biens disponibles sur <strong>linkimmo.be</strong> ou contactez-nous directement pour un accompagnement personnalisé.","Nous avons régulièrement des biens à louer à Ixelles et dans les communes voisines. Budget et préférences ?"],
  "contact":["Contactez Dimitri directement : ☎️ <strong>02/640.10.10</strong> ou 📧 info@linkimmo.be. Nos bureaux : Rue du Tabellion 66, 1050 Ixelles.","Rue du Tabellion 66, Ixelles. Tél : 02/640.10.10 · info@linkimmo.be. On vous répond rapidement !"],
  "default":["Link Immo est votre agence indépendante à Ixelles, active dans les 19 communes de Bruxelles. Achat, vente, location, gestion locative. Appelez le <strong>02/640.10.10</strong> ou visitez linkimmo.be.","Pour toute question immobilière, Dimitri et son équipe sont à votre disposition : <strong>02/640.10.10</strong> · info@linkimmo.be 🏠"]
};
let ri={};
function getR(k){ri[k]=(ri[k]||0);let r=R[k][ri[k]%R[k].length];ri[k]++;return r;}
function detect(t){t=t.toLowerCase();if(t.match(/estim|valeur|évaluer|combien vaut/))return"estim";if(t.match(/achat|acheter|achète|buy|cherche/))return"achat";if(t.match(/vendre|vente|mettre en|céder/))return"vente";if(t.match(/gestion|locatif|gérer|propriétaire|loyer/))return"gestion";if(t.match(/louer|location|locataire|appartement à louer/))return"louer";if(t.match(/contact|adresse|téléphone|email|dimitri/))return"contact";return"default";}
function addMsg(t,s,html=false){const m=document.createElement('div');m.className='msg '+s;const sn=document.createElement('div');sn.className='sender';sn.textContent=s==='bot'?'Link Immo':'Vous';m.appendChild(sn);const txt=document.createElement('span');if(html)txt.innerHTML=t;else txt.textContent=t;m.appendChild(txt);document.getElementById('msgs').appendChild(m);m.scrollIntoView({behavior:'smooth'});}
function showTyping(){const t=document.createElement('div');t.className='msg bot';t.id='typing';t.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';document.getElementById('msgs').appendChild(t);t.scrollIntoView({behavior:'smooth'});}
function ask(el){const q=el.textContent;document.getElementById('sugs').style.display='none';addMsg(q,'user');showTyping();setTimeout(()=>{document.getElementById('typing')?.remove();addMsg(getR(detect(q)),'bot',true);},900);}
function send(){const v=document.getElementById('inp').value.trim();if(!v)return;document.getElementById('sugs').style.display='none';document.getElementById('inp').value='';addMsg(v,'user');showTyping();setTimeout(()=>{document.getElementById('typing')?.remove();addMsg(getR(detect(v)),'bot',true);},900);}
</script>
</body>
</html>
