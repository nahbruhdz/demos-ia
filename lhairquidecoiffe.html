<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'Hair qui décoiffe — Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Lato:wght@300;400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#f4ede4;font-family:'Lato',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh}
  .demo-banner{position:fixed;top:0;left:0;right:0;background:#8b5e3c;color:#fff;text-align:center;padding:8px;font-size:11px;letter-spacing:1px;z-index:100}
  .widget{width:400px;height:610px;display:flex;flex-direction:column;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 20px 50px rgba(139,94,60,0.15);margin-top:30px}
  .header{background:linear-gradient(135deg,#8b5e3c,#c4956a);padding:22px 20px;display:flex;align-items:center;justify-content:space-between}
  .h-left{display:flex;flex-direction:column}
  .h-name{font-family:'Playfair Display',serif;font-size:19px;color:#fff;font-style:italic}
  .h-sub{font-size:10px;color:rgba(255,255,255,0.8);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px}
  .h-badge{background:rgba(255,255,255,0.2);color:#fff;font-size:10px;padding:4px 10px;border-radius:20px;letter-spacing:1px}
  .messages{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px;background:#fdf8f4}
  .msg{max-width:84%;padding:12px 16px;font-size:13px;line-height:1.65}
  .msg.bot{background:#fff;color:#3d2b1f;border-radius:0 14px 14px 14px;box-shadow:0 2px 8px rgba(139,94,60,0.1)}
  .msg.user{background:#8b5e3c;color:#fff;border-radius:14px 14px 0 14px;margin-left:auto}
  .sender{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;color:#c4956a}
  .msg.user .sender{color:rgba(255,255,255,0.7)}
  .suggestions{display:flex;flex-wrap:wrap;gap:7px;padding:0 18px 12px}
  .sug{background:#fff;border:1.5px solid #e8d5c4;color:#8b5e3c;padding:7px 13px;border-radius:20px;font-size:12px;cursor:pointer;font-family:'Lato',sans-serif;font-weight:700;transition:all .2s}
  .sug:hover{background:#8b5e3c;color:#fff;border-color:#8b5e3c}
  .input-area{padding:14px 18px;background:#fff;display:flex;gap:10px;border-top:1px solid #f0e8e0}
  .input-area input{flex:1;border:1.5px solid #e8d5c4;padding:10px 14px;font-size:13px;font-family:'Lato',sans-serif;outline:none;border-radius:25px;background:#fdf8f4;color:#3d2b1f}
  .input-area input:focus{border-color:#8b5e3c}
  .send-btn{background:#8b5e3c;color:#fff;border:none;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:16px;transition:all .2s}
  .send-btn:hover{background:#c4956a}
  .typing{display:flex;gap:5px;padding:6px 0}
  .typing span{width:7px;height:7px;background:#c4956a;border-radius:50%;animation:b 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s}
  .typing span:nth-child(3){animation-delay:.4s}
  @keyframes b{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}
</style>
</head>
<body>
<div class="demo-banner">💇 Démo interactive — Assistant IA L'Hair qui décoiffe</div>
<div class="widget">
  <div class="header">
    <div class="h-left">
      <span class="h-name">L'Hair qui décoiffe</span>
      <span class="h-sub">Coiffure & Esthétique · Bruxelles</span>
    </div>
    <span class="h-badge">En ligne</span>
  </div>
  <div class="messages" id="msgs">
    <div class="msg bot">
      <div class="sender">Hélène</div>
      Bonjour ! 👋 Bienvenue chez L'Hair qui décoiffe.<br><br>Je suis là pour vous aider — rendez-vous, tarifs, épilation… Comment puis-je vous aider ?
    </div>
  </div>
  <div class="suggestions" id="sugs">
    <button class="sug" onclick="ask(this)">Réserver un RDV</button>
    <button class="sug" onclick="ask(this)">Épilation laser</button>
    <button class="sug" onclick="ask(this)">Prix coloration</button>
    <button class="sug" onclick="ask(this)">Horaires</button>
  </div>
  <div class="input-area">
    <input id="inp" placeholder="Écrivez votre question…" onkeydown="if(event.key==='Enter')send()">
    <button class="send-btn" onclick="send()">→</button>
  </div>
</div>
<script>
const R={
  "rdv":["Pour prendre rendez-vous, c'est simple : via <strong>Treatwell</strong> sur notre site, ou WhatsApp au <strong>+32 483 58 22 08</strong>. Hélène vous accueille du mardi au samedi !","Réservez en ligne sur Treatwell ou appelez le <strong>+32 483 58 22 08</strong>. Préférez-vous le matin ou l'après-midi ?"],
  "laser":["L'épilation au laser est permanente et très efficace. Nous proposons différentes zones : jambes, maillot, aisselles, visage… Contactez-nous au <strong>+32 483 58 22 08</strong> pour une consultation gratuite.","L'épilation laser nécessite plusieurs séances selon la pilosité. Résultat durable et doux pour la peau. Envie d'un devis gratuit ?"],
  "coloration":["Nos colorations incluent : retouche racines, balayage, ombré, mèches. Chaque prestation est personnalisée selon votre style et votre carnation. Prix sur <strong>Treatwell</strong> ou au <strong>+32 483 58 22 08</strong>.","Hélène est spécialisée en coloration féminine — balayage soleil, ombré hair, couleur globale. Quel résultat recherchez-vous ?"],
  "horaire":["Le salon est ouvert <strong>du mardi au vendredi 9h–18h30</strong> et le <strong>samedi 9h–18h</strong>. Fermé dimanche et lundi. Rue de Laeken 8, près de Sainte-Catherine.","Nos horaires : mardi–vendredi 9h–18h30, samedi 9h–18h. On vous attend au cœur de Bruxelles !"],
  "cire":["L'épilation à la cire est disponible pour toutes les zones. Rapide et efficace, idéale si vous n'êtes pas encore prête pour le laser. RDV au <strong>+32 483 58 22 08</strong>.","Épilation cire ou laser, nous vous conseillons selon vos besoins. Vous pouvez aussi combiner les deux lors d'une même visite !"],
  "coupe":["Coupes femmes, hommes et enfants. Chaque coupe est précédée d'un conseil personnalisé. Prix disponibles sur Treatwell.","Nos coiffeurs adaptent la coupe à votre visage, votre style et votre routine. Jamais de coupe au hasard chez nous !"],
  "adresse":["Nous sommes Rue de Laeken 8, 1000 Bruxelles — à deux pas du métro Sainte-Catherine et De Brouckère. Parkings disponibles à proximité.","Rue de Laeken 8, quartier Sainte-Catherine. Facile d'accès en métro, tram ou à pied depuis le centre !"],
  "default":["Je suis l'assistante du salon L'Hair qui décoiffe. Pour toute question, vous pouvez aussi nous écrire sur WhatsApp : <strong>+32 483 58 22 08</strong> ou réserver sur Treatwell. 💇","N'hésitez pas à nous contacter directement au <strong>+32 483 58 22 08</strong> — Hélène et son équipe seront ravies de vous accueillir !"]
};
let ri={};
function getR(k){ri[k]=(ri[k]||0);let r=R[k][ri[k]%R[k].length];ri[k]++;return r;}
function detect(t){t=t.toLowerCase();if(t.match(/rdv|rendez|réserv|book|appointment/))return"rdv";if(t.match(/laser|définitif|permanent/))return"laser";if(t.match(/coloration|couleur|balayage|ombré|mèche/))return"coloration";if(t.match(/horaire|heure|ouvert|fermé|quand/))return"horaire";if(t.match(/cire|épilation à la/))return"cire";if(t.match(/coupe|cut/))return"coupe";if(t.match(/adresse|où|localisation|sainte.catherine/))return"adresse";return"default";}
function addMsg(t,s,html=false){const m=document.createElement('div');m.className='msg '+s;const sn=document.createElement('div');sn.className='sender';sn.textContent=s==='bot'?'Hélène':'Vous';m.appendChild(sn);const txt=document.createElement('span');if(html)txt.innerHTML=t;else txt.textContent=t;m.appendChild(txt);document.getElementById('msgs').appendChild(m);m.scrollIntoView({behavior:'smooth'});}
function showTyping(){const t=document.createElement('div');t.className='msg bot';t.id='typing';t.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';document.getElementById('msgs').appendChild(t);t.scrollIntoView({behavior:'smooth'});}
function ask(el){const q=el.textContent;document.getElementById('sugs').style.display='none';addMsg(q,'user');showTyping();setTimeout(()=>{document.getElementById('typing')?.remove();addMsg(getR(detect(q)),'bot',true);},900);}
function send(){const v=document.getElementById('inp').value.trim();if(!v)return;document.getElementById('sugs').style.display='none';document.getElementById('inp').value='';addMsg(v,'user');showTyping();setTimeout(()=>{document.getElementById('typing')?.remove();addMsg(getR(detect(v)),'bot',true);},900);}
</script>
</body>
</html>
